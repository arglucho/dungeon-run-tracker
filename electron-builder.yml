appId: com.dungeon-run-tracker
productName: Dungeon Run Tracker
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{vitest.config.ts,database_dev.db}'
extraResources:
  - from: resources/
    to: resources/
    filter:
      - '**/*.json'
      - '**/*.svg'
asarUnpack:
  - resources/**
win:
  executableName: DungeonRunTracker
  target:
    - nsis
nsis:
  artifactName: DungeonRunTracker-${version}-setup.${ext}
  shortcutName: Dungeon Run Tracker
  uninstallDisplayName: Dungeon Run Tracker
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
